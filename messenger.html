<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>P2P Messenger</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1117;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

header{
background:#1a1f2b;
width:100%;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

header img{
width:40px;
height:40px;
border-radius:50%;
}

#chat{
width:90%;
max-width:500px;
height:350px;
overflow:auto;
background:#1a1f2b;
margin:10px;
padding:10px;
border-radius:10px;
}

.msg{
display:flex;
gap:8px;
margin:5px 0;
}

.msg img{
width:30px;
height:30px;
border-radius:50%;
}

.msg span{
background:#6c7cff;
padding:6px 10px;
border-radius:10px;
}

.controls{
display:flex;
gap:5px;
margin-bottom:10px;
}

button{
background:#6c7cff;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<img id="avatar" src="https://i.imgur.com/4Z7QZ9F.png">
<b>P2P Messenger</b>
</header>

<div style="margin:10px">

<div>Your ID:</div>
<div id="myid">loading...</div>

<br>

<input id="friendid" placeholder="friend ID">
<button onclick="connect()">connect</button>

<br><br>

<input type="file" id="avatarInput">

</div>

<div id="chat"></div>

<div class="controls">
<input id="msg" placeholder="message">
<button onclick="send()">send</button>
</div>

<script>

let peer = new Peer()

let conn

let avatar = document.getElementById("avatar").src

peer.on("open", id=>{
document.getElementById("myid").innerText=id
})

peer.on("connection", c=>{
conn=c
setup()
})

function connect(){

let id=document.getElementById("friendid").value

conn = peer.connect(id)

conn.on("open",setup)

}

function setup(){

conn.on("data",data=>{
addMsg(data.text,data.avatar)
})

}

function addMsg(text,av){

let div=document.createElement("div")
div.className="msg"

div.innerHTML=`
<img src="${av}">
<span>${text}</span>
`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function send(){

let text=msg.value

let data={
text:text,
avatar:avatar
}

conn.send(data)

addMsg(text,avatar)

msg.value=""

}

avatarInput.onchange=e=>{

let reader=new FileReader()

reader.onload=()=>{
avatar=reader.result
document.getElementById("avatar").src=avatar
}

reader.readAsDataURL(e.target.files[0])

}

</script>

</body>
  </html>
